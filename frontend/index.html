<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQuiz | Master Your Skills</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i data-feather="cloud-lightning"></i> CloudQuiz
        </div>
        <div class="nav-links">
            <a href="login.html" class="btn btn-outline">Login</a>
            <a href="login.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Elevate Your Knowledge in the Cloud ☁️</h1>
            <p>The ultimate platform for testing your skills. Secure, fast, and hosted seamlessly on AWS.</p>
            <div class="cta-buttons">
                <a href="login.html" class="btn btn-primary btn-large">Start Testing</a>
                <a href="#features" class="btn btn-secondary btn-large">Learn More</a>
            </div>
        </div>
        <div class="hero-graphics">
            <div class="glass-card floating">
                <i data-feather="check-circle" class="icon-success"></i>
                <div>
                    <h4>AWS Certified</h4>
                    <p>Passed with 95%</p>
                </div>
            </div>
            <div class="glass-card floating delayed">
                <i data-feather="clock" class="icon-warning"></i>
                <div>
                    <h4>Time Remaining</h4>
                    <p>04:59</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        feather.replace();
    </script>
</body>
</html>
