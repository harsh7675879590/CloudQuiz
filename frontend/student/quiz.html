<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Attempt | CloudQuiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="quiz-layout">
    <header class="quiz-header glass-card">
        <div>
            <h2 id="quizTitle">Loading Quiz...</h2>
            <p id="quizProgress">Question 1 of ?</p>
        </div>
        <div class="timer-display" id="timerDisplay">
            <i data-feather="clock"></i>
            <span id="timeRemaining">00:00</span>
        </div>
    </header>

    <main class="quiz-container">
        <div class="question-nav" id="questionNav">
            <!-- Bubbles injected via JS -->
        </div>

        <div class="question-card glass-card" id="questionCard">
            <div class="question-text">
                <span class="question-number" id="qNum">Q1</span>
                <p id="qText">Loading question...</p>
            </div>
            
            <div class="options-list" id="optionsList">
                <!-- Options injected via JS -->
            </div>
            
            <div class="quiz-actions">
                <button class="btn btn-secondary" id="btnPrev" disabled>Previous</button>
                <button class="btn btn-primary" id="btnNext">Next</button>
            </div>
            
            <div class="submit-action mt-4" style="text-align: center;">
                <button class="btn btn-success hidden" id="btnSubmit">Submit Quiz</button>
            </div>
        </div>
    </main>

    <!-- Overlay for Loading / Submitting -->
    <div class="loading-overlay hidden" id="overlay">
        <i data-feather="loader" class="spin large-icon"></i>
        <h3 class="mt-4" id="overlayText">Loading...</h3>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
